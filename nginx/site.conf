# /etc/nginx/sites-available/nail-designer
# Substitua SEU_DOMINIO.com pelo seu domínio real.

server {
    listen 80;
    server_name SEU_DOMINIO.com www.SEU_DOMINIO.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name SEU_DOMINIO.com www.SEU_DOMINIO.com;

    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Página de captura: /aprenda-comigo ──────────────────────────────
    location /aprenda-comigo {
        alias /var/www/nail-designer/dist;
        try_files $uri $uri/ /aprenda-comigo/index.html;

        location ~* \.(js|css|woff2?|png|jpg|webp|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API de analytics ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        client_max_body_size 64k;
    }
}
